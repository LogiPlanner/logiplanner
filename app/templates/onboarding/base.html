<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Setup — LogiPlanner{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Set up your team and project on LogiPlanner.{% endblock %}">
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="stylesheet" href="/static/auth/css/common.css">
    <link rel="stylesheet" href="/static/onboarding/css/onboarding.css">
    {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    {% block content %}{% endblock %}
    <script src="/static/auth/js/common.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/static/auth/js/three-bg.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
