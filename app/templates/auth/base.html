<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LogiPlanner{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}LogiPlanner — AI-powered project memory and management for aligned teams.{% endblock %}">
    <link rel="stylesheet" href="/static/auth/css/common.css">
    {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    {% block content %}{% endblock %}
    <script src="/static/auth/js/common.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
