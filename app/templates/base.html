<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}LogiPlanner — Plans With Logic{% endblock %}">
    <title>{% block title %}LogiPlanner{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="stylesheet" href="/static/auth/css/common.css">
    {% block styles %}{% endblock %}
</head>
<body>
    <!-- Mobile hamburger toggle -->
    <button class="mobile-toggle" id="mobileToggle" aria-label="Toggle navigation">
        <svg viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>

    <!-- Mobile overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    {% block layout %}
    <div class="dashboard">
        <!-- ═══ SHARED SIDEBAR ═══ -->
        {% include "partials/sidebar.html" %}

        <!-- ═══ MAIN CONTENT ═══ -->
        {% block content %}{% endblock %}
    </div>
    {% endblock %}

    <!-- ═══ SHARED BASE SCRIPTS ═══ -->
    <script src="/static/js/storage-keys.js"></script>
    <script src="/static/js/common.js" defer></script>
    {% block scripts %}{% endblock %}
</body>
</html>
