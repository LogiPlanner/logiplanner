# alembic.ini
[alembic]
script_location = migrations
version_locations = %(script_location)s/versions

# This is the line you tried to set earlier
sqlalchemy.url = postgresql+psycopg2://postgres:dxdelvin@localhost:5432/logiplanner

[post_write_hooks]
# Uncomment if you want to run black/flake8 after generating migrations
# hooks = black
# black.args = -l 88

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S